<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive website</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>
    <nav>
        <a href="#">Moon</a>
        <a href="#">Image</a>
        <a href="#">Video</a>
    </nav>
    <h1>My responsive website</h1>
    <img src="image2.jfif" alt="Image">
    <video controls>
        <source src="video2.mp4" type="video/mp4">
    </video>
    <h2>Moon</h2>
    <table>
            <tr>
                <th>1</th>
                <th>2</th>
                <th>3</th>
        </tr>
        <tr>
            <td>Pink</td>
            <td>Red</td>
            <td>Yellow</td>
        </tr>
        <tr>
            <td>Full</td>
            <td>Cold</td>
            <td>Snow</td>
        </tr>
    </table>
    <button>Click here</button>
    <h3>grid-container</h3>
    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>
    
</body>
</html>
